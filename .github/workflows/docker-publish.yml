name: Docker Build & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: wenleigood/guacd-debian

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - version: '1.5'
            guacd: '1.5.5'
            tags: |
              wenleigood/guacd-debian:1.5.5
              wenleigood/guacd-debian:1.5
          - version: '1.6'
            guacd: '1.6.0'
            latest: true
            tags: |
              wenleigood/guacd-debian:1.6.0
              wenleigood/guacd-debian:1.6
              wenleigood/guacd-debian:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.version }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}
